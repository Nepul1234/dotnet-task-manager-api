<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #94a3b8;
      --accent:    #6366f1;
      --accent-h:  #4f46e5;
      --success:   #22c55e;
      --danger:    #ef4444;
      --danger-h:  #dc2626;
      --warning:   #f59e0b;
      --radius:    12px;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Layout ── */
    .container { max-width: 680px; margin: 0 auto; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2rem;
    }
    .header-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 1.3rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: .85rem; color: var(--muted); margin-top: 1px; }

    /* ── Stats Bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow);
    }
    .stat-value { font-size: 1.8rem; font-weight: 700; line-height: 1; }
    .stat-label { font-size: .75rem; color: var(--muted); margin-top: .35rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value.accent  { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.warning { color: var(--warning); }

    /* ── Add Task Form ── */
    .add-form {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.25rem;
    }
    input[type="text"] {
      flex: 1;
      padding: .75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: var(--shadow);
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      padding: .75rem 1.25rem;
      border: none;
      border-radius: var(--radius);
      font-size: .9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
    }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent-h); }

    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-danger:hover  { background: var(--danger-h); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }

    /* ── Filter Tabs ── */
    .filters {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.25rem;
    }
    .filter-btn {
      padding: .45rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .85rem;
      font-family: inherit;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Task List ── */
    #task-list { display: flex; flex-direction: column; gap: .75rem; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s;
      animation: slideIn .2s ease;
    }
    .task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,.1); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Custom Checkbox */
    .checkbox {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: all .2s;
    }
    .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }
    .checkbox.checked::after {
      content: '✓';
      color: #fff;
      font-size: .8rem;
      font-weight: 700;
    }

    .task-info { flex: 1; min-width: 0; }
    .task-title {
      font-size: .95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all .2s;
    }
    .task-title.done {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-date {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .2rem;
    }

    .task-actions { display: flex; gap: .5rem; }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: grid; place-items: center;
      font-size: .9rem;
      transition: all .2s;
      color: var(--muted);
    }
    .icon-btn:hover.edit  { background: #ede9fe; border-color: #c4b5fd; color: var(--accent); }
    .icon-btn:hover.delete { background: #fee2e2; border-color: #fca5a5; color: var(--danger); }

    /* ── Empty State ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: .75rem; }
    .empty h3   { font-size: 1.1rem; font-weight: 600; color: var(--text); }
    .empty p    { font-size: .875rem; margin-top: .35rem; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(4px);
      z-index: 100;
      place-items: center;
    }
    .overlay.open { display: grid; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 1.75rem;
      width: min(420px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal h2       { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }
    .modal label    { font-size: .85rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: .4rem; }
    .modal input    { width: 100%; margin-bottom: 1rem; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1.25rem;
      cursor: pointer;
      user-select: none;
    }
    .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .checkbox-row span { font-size: .9rem; font-weight: 500; }

    .modal-actions { display: flex; justify-content: flex-end; gap: .75rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: #1e293b;
      color: #fff;
      padding: .75rem 1.25rem;
      border-radius: var(--radius);
      font-size: .875rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
      transform: translateY(120%);
      transition: transform .3s ease;
      z-index: 200;
    }
    #toast.show { transform: translateY(0); }
    #toast.success { border-left: 4px solid var(--success); }
    #toast.error   { border-left: 4px solid var(--danger); }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="header-icon">✅</div>
    <div>
      <h1>Task Manager</h1>
      <p>Stay organized. Get things done.</p>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value accent" id="stat-total">0</div>
      <div class="stat-label">Total Tasks</div>
    </div>
    <div class="stat">
      <div class="stat-value success" id="stat-done">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat">
      <div class="stat-value warning" id="stat-pending">0</div>
      <div class="stat-label">Remaining</div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="add-form">
    <input type="text" id="new-task-input" placeholder="Add a new task..." />
    <button class="btn btn-primary" onclick="createTask()">+ Add Task</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
  </div>

  <!-- Task List -->
  <div id="task-list"></div>

</div>

<!-- Edit Modal -->
<div class="overlay" id="edit-modal">
  <div class="modal">
    <h2>Edit Task</h2>
    <label>Title</label>
    <input type="text" id="edit-title" placeholder="Task title..." />
    <label class="checkbox-row">
      <input type="checkbox" id="edit-completed" />
      <span>Mark as completed</span>
    </label>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast"></div>

<script>
  // =============================================
  //   CONFIG
  //   Change this port to match your dotnet run output
  // =============================================
  const API = 'http://localhost:5218';

  // ── State ──
  let allTasks  = [];
  let filter    = 'all';
  let editingId = null;

  // ── On Page Load ──
  loadTasks();

  // Press Enter to add a task
  document.getElementById('new-task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTask();
  });

  // Close modal when clicking outside
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });


  // =============================================
  //   LOAD ALL TASKS  (GET /tasks)
  // =============================================
  async function loadTasks() {
    try {
      const res   = await fetch(`${API}/tasks`);
      allTasks    = await res.json();
      renderTasks();
      updateStats();
    } catch {
      showToast('Cannot connect to API. Is the server running?', 'error');
    }
  }


  // =============================================
  //   CREATE TASK  (POST /tasks)
  // =============================================
  async function createTask() {
    const input = document.getElementById('new-task-input');
    const title = input.value.trim();

    if (!title) {
      showToast('Please enter a task title.', 'error');
      input.focus();
      return;
    }

    // Send the new task to the API
    const res = await fetch(`${API}/tasks`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ title })  // { "title": "..." }
    });

    if (res.ok) {
      input.value = '';
      showToast('Task added!', 'success');
      loadTasks(); // Refresh the list
    } else {
      showToast('Failed to add task.', 'error');
    }
  }


  // =============================================
  //   TOGGLE COMPLETE  (PUT /tasks/{id})
  //   Called when user clicks the checkbox
  // =============================================
  async function toggleComplete(task) {
    await fetch(`${API}/tasks/${task.id}`, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        title:       task.title,
        isCompleted: !task.isCompleted  // flip it
      })
    });
    loadTasks();
  }


  // =============================================
  //   DELETE TASK  (DELETE /tasks/{id})
  // =============================================
  async function deleteTask(id) {
    const res = await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });

    if (res.ok) {
      showToast('Task deleted.', 'success');
      loadTasks();
    } else {
      showToast('Failed to delete task.', 'error');
    }
  }


  // =============================================
  //   OPEN EDIT MODAL
  // =============================================
  function openEdit(task) {
    editingId = task.id;
    document.getElementById('edit-title').value         = task.title;
    document.getElementById('edit-completed').checked   = task.isCompleted;
    document.getElementById('edit-modal').classList.add('open');
    document.getElementById('edit-title').focus();
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null;
  }


  // =============================================
  //   SAVE EDIT  (PUT /tasks/{id})
  // =============================================
  async function saveEdit() {
    const title       = document.getElementById('edit-title').value.trim();
    const isCompleted = document.getElementById('edit-completed').checked;

    if (!title) {
      showToast('Title cannot be empty.', 'error');
      return;
    }

    const res = await fetch(`${API}/tasks/${editingId}`, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ title, isCompleted })
    });

    if (res.ok) {
      closeModal();
      showToast('Task updated!', 'success');
      loadTasks();
    } else {
      showToast('Failed to update task.', 'error');
    }
  }


  // =============================================
  //   RENDER TASKS  (builds the HTML cards)
  // =============================================
  function renderTasks() {
    const list = document.getElementById('task-list');

    // Apply the active filter
    const visible = allTasks.filter(t => {
      if (filter === 'active')    return !t.isCompleted;
      if (filter === 'completed') return  t.isCompleted;
      return true; // 'all'
    });

    // Show empty state if no tasks
    if (visible.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${filter === 'completed' ? '🎉' : '📋'}</div>
          <h3>${filter === 'completed' ? 'No completed tasks yet' : 'No tasks here'}</h3>
          <p>${filter === 'all' ? 'Add your first task above!' : 'Switch filter to see other tasks.'}</p>
        </div>`;
      return;
    }

    // Build a card for each task
    list.innerHTML = visible.map(task => `
      <div class="task-card" id="card-${task.id}">

        <!-- Checkbox to toggle complete -->
        <div class="checkbox ${task.isCompleted ? 'checked' : ''}"
             onclick='toggleComplete(${JSON.stringify(task)})'
             title="${task.isCompleted ? 'Mark incomplete' : 'Mark complete'}">
        </div>

        <!-- Task info -->
        <div class="task-info">
          <div class="task-title ${task.isCompleted ? 'done' : ''}">${escapeHtml(task.title)}</div>
          <div class="task-date">${formatDate(task.createdAt)}</div>
        </div>

        <!-- Action buttons -->
        <div class="task-actions">
          <button class="icon-btn edit"   onclick='openEdit(${JSON.stringify(task)})'  title="Edit">✏️</button>
          <button class="icon-btn delete" onclick="deleteTask(${task.id})"              title="Delete">🗑️</button>
        </div>

      </div>
    `).join('');
  }


  // =============================================
  //   HELPERS
  // =============================================

  function updateStats() {
    const total   = allTasks.length;
    const done    = allTasks.filter(t => t.isCompleted).length;
    const pending = total - done;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-pending').textContent = pending;
  }

  function setFilter(value, btn) {
    filter = value;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Prevent XSS — never put raw user text into innerHTML
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent  = msg;
    toast.className    = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.className = '', 3000);
  }
</script>

</body>
</html>
